<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Big Turd Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-xl shadow p-8 max-w-md w-full text-center">
    <h1 class="text-2xl font-bold mb-6">🐕 Big Turd Setup</h1>
    <div id="status" class="text-lg mb-6">Setting up...</div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBaSETzAzXCDC_RHntmNKeM9nO4pcA6VRA",
      authDomain: "unaligned-fc556.firebaseapp.com",
      projectId: "unaligned-fc556",
      storageBucket: "unaligned-fc556.firebasestorage.app",
      messagingSenderId: "720311168962",
      appId: "1:720311168962:web:18d9f60626671a6e13f05b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = 'bigturd@admin.com';
    const ADMIN_PASSWORD = 'BigTurd2026!';

    const status = document.getElementById('status');

    // Check auth state
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Already logged in, go to admin
        status.innerHTML = '✅ Logged in! <br>Redirecting to admin...';
        setTimeout(() => window.location.href = 'admin.html', 1000);
      } else {
        // Try to sign in first
        try {
          await signInWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
          status.innerHTML = '✅ Logged in! <br>Redirecting to admin...';
          setTimeout(() => window.location.href = 'admin.html', 1000);
        } catch (err) {
          if (err.code === 'auth/user-not-found') {
            // Create admin
            status.innerHTML = 'Creating admin account...';
            try {
              const userCred = await createUserWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASSWORD);
              await setDoc(doc(db, 'clients', userCred.user.uid), {
                name: 'Admin',
                email: ADMIN_EMAIL,
                address: 'Admin Account',
                createdAt: new Date().toISOString(),
                starLevel: 99,
                isAdmin: true
              });
              status.innerHTML = '✅ Admin created! <br>Redirecting...';
              setTimeout(() => window.location.href = 'admin.html', 1500);
            } catch (createErr) {
              status.innerHTML = '<span class="text-red-600">Error: ' + createErr.message + '</span>';
            }
          } else {
            status.innerHTML = '<span class="text-red-600">Error: ' + err.message + '</span>';
          }
        }
      }
    });
  </script>
</body>
</html>
